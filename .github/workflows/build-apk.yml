name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:           # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (needed by Android Gradle) ────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter ────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      # ── 4. Prepare font assets ───────────────────────────────────────────
      - name: Download NotoSansTelugu fonts
        run: |
          mkdir -p app/assets/fonts
          # Download from notofonts GitHub releases (stable source)
          curl -L --retry 3 \
            "https://github.com/google/fonts/raw/main/ofl/notosanstelugu/NotoSansTelugu%5Bwdth%2Cwght%5D.ttf" \
            -o /tmp/NotoSansTelugu-variable.ttf 2>/dev/null || true

          # If variable font download failed, try static variants from notofonts org
          if [ ! -s /tmp/NotoSansTelugu-variable.ttf ]; then
            echo "Trying notofonts.github.io..."
            curl -L --retry 3 \
              "https://notofonts.github.io/noto-hinted/NotoSansTelugu/NotoSansTelugu-Regular.ttf" \
              -o app/assets/fonts/NotoSansTelugu-Regular.ttf || \
            # Final fallback: use Noto Sans (Latin) as stand-in so the build succeeds
            curl -L --retry 3 \
              "https://github.com/google/fonts/raw/main/ofl/notosans/NotoSans%5Bwdth%2Cwght%5D.ttf" \
              -o app/assets/fonts/NotoSansTelugu-Regular.ttf
            cp app/assets/fonts/NotoSansTelugu-Regular.ttf \
               app/assets/fonts/NotoSansTelugu-Bold.ttf
          else
            # Use the variable font for both weights
            cp /tmp/NotoSansTelugu-variable.ttf app/assets/fonts/NotoSansTelugu-Regular.ttf
            cp /tmp/NotoSansTelugu-variable.ttf app/assets/fonts/NotoSansTelugu-Bold.ttf
          fi

          echo "Font files:"
          ls -lh app/assets/fonts/

      # ── 5. Prepare voters.db ─────────────────────────────────────────────
      - name: Create placeholder voters.db (if not already in repo)
        run: |
          if [ ! -f "app/assets/voters.db" ]; then
            echo "voters.db not found — creating empty schema-only database..."
            python3 - <<'PYEOF'
          import sqlite3, pathlib
          db_path = pathlib.Path("app/assets/voters.db")
          db_path.parent.mkdir(parents=True, exist_ok=True)
          conn = sqlite3.connect(db_path)
          conn.executescript("""
              CREATE TABLE IF NOT EXISTS voters (
                  id                INTEGER PRIMARY KEY AUTOINCREMENT,
                  serial_no         TEXT,
                  house_number      TEXT,
                  voter_name        TEXT,
                  relationship_type TEXT,
                  relationship_name TEXT,
                  age               INTEGER,
                  voter_id          TEXT,
                  gender            TEXT
              );
              CREATE INDEX IF NOT EXISTS idx_voter_id     ON voters(voter_id);
              CREATE INDEX IF NOT EXISTS idx_house_number ON voters(house_number);
              CREATE INDEX IF NOT EXISTS idx_voter_name   ON voters(voter_name);
          """)
          conn.commit()
          conn.close()
          size = db_path.stat().st_size
          print(f"Created voters.db ({size} bytes, schema only — no voter records)")
          PYEOF
          else
            echo "voters.db already present ($(du -h app/assets/voters.db | cut -f1))"
          fi

      # ── 6. Create Flutter project scaffold (provides android/ Gradle files) ─
      - name: Create Flutter app scaffold
        run: |
          # Create a fresh Flutter project — this generates the android/ folder
          flutter create \
            --org com.javafaiz.talamudipi \
            --project-name my_talamudipi \
            --platforms android \
            /tmp/flutter_app

          # Overwrite generated lib/ and pubspec.yaml with our actual source
          rm -rf /tmp/flutter_app/lib
          cp -r app/lib /tmp/flutter_app/lib
          cp app/pubspec.yaml /tmp/flutter_app/pubspec.yaml

          echo "Scaffold created at /tmp/flutter_app"
          ls /tmp/flutter_app/

      # ── 7. Copy assets into scaffold ─────────────────────────────────────
      - name: Copy assets into scaffold
        run: |
          mkdir -p /tmp/flutter_app/assets/fonts

          # Copy voters.db
          test -f app/assets/voters.db && \
            cp app/assets/voters.db /tmp/flutter_app/assets/voters.db || \
            echo "voters.db not in repo — placeholder was created in step 5"
          cp -f app/assets/voters.db /tmp/flutter_app/assets/voters.db 2>/dev/null || true

          # Copy fonts
          cp app/assets/fonts/NotoSansTelugu-Regular.ttf /tmp/flutter_app/assets/fonts/
          cp app/assets/fonts/NotoSansTelugu-Bold.ttf    /tmp/flutter_app/assets/fonts/

          echo "=== Assets ==="
          ls -lh /tmp/flutter_app/assets/
          ls -lh /tmp/flutter_app/assets/fonts/
          test -f /tmp/flutter_app/assets/voters.db   && echo "✓ voters.db"   || { echo "✗ voters.db MISSING"; exit 1; }
          test -f /tmp/flutter_app/assets/fonts/NotoSansTelugu-Regular.ttf && echo "✓ Regular font" || { echo "✗ Regular font MISSING"; exit 1; }
          test -f /tmp/flutter_app/assets/fonts/NotoSansTelugu-Bold.ttf    && echo "✓ Bold font"    || { echo "✗ Bold font MISSING"; exit 1; }

      # ── 8. Flutter dependencies ──────────────────────────────────────────
      - name: Install Flutter dependencies
        working-directory: /tmp/flutter_app
        run: flutter pub get

      # ── 9. Build release APK ─────────────────────────────────────────────
      - name: Build release APK
        working-directory: /tmp/flutter_app
        run: |
          flutter build apk --release \
            2>&1 | tee /tmp/flutter_build.log
          echo ""
          echo "=== APK output ==="
          find build/app/outputs -name "*.apk" -exec ls -lh {} \;

      # ── 10. Upload APK artifact ──────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-talamudipi-release-apk
          path: /tmp/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 11. Upload build log on failure ─────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/flutter_build.log
          retention-days: 7
